<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Transform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSS 3D Transform</h1>

    <div class="container">
        <div class="box rotateX">rotateX</div>
        <div class="box rotateY">rotateY</div>
        <div class="box rotateZ">rotateZ</div>
        <div class="box translateZ">translateZ</div>
        <div class="box scale3d">scale3d</div>

    </div>

    <h2>3D Perspective + Hover</h2>

    <div class="perspective">
        <div class="box hover3d">Hover me</div>
    </div>
</body>
</html>
