<!DOCTYPE html>
<html>
<head>
    <title>CSS Text Complete</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Text Complete Example</h1>

<p class="color">This is Text Color</p>

<p class="align">This is Center Aligned Text</p>

<p class="decoration">This is Underlined Text</p>

<p class="decoration-style">This is Fancy Decoration Style</p>

<p class="transform">this will become uppercase</p>

<p class="spacing">
    This text has letter spacing, word spacing and line height applied.
</p>

<p class="shadow">This text has shadow effect</p>

</body>
</html>
