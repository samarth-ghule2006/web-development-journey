<!DOCTYPE html>
<html>
<head>
    <title>CSS Animations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Animations - All Concepts</h1>

<!-- BASIC ANIMATION -->
<section>
    <h2>1. Basic Animation</h2>
    <div class="box basic">Move</div>
</section>

<!-- TIMING + DELAY -->
<section>
    <h2>2. Timing + Delay</h2>
    <div class="box timing">Timing</div>
</section>

<!-- ITERATION -->
<section>
    <h2>3. Iteration</h2>
    <div class="box infinite">Infinite</div>
</section>

<!-- DIRECTION -->
<section>
    <h2>4. Direction</h2>
    <div class="box direction">Alternate</div>
</section>

<!-- FILL MODE -->
<section>
    <h2>5. Fill Mode</h2>
    <div class="box fill">Fill</div>
</section>

<!-- MULTIPLE EFFECT -->
<section>
    <h2>6. Multiple Effects</h2>
    <div class="box combo">Combo</div>
</section>

<!-- REAL ANIMATION -->
<section>
    <h2>7. Real Animation (Bounce)</h2>
    <div class="ball"></div>
</section>

</body>
</html>
