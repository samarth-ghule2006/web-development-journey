<!DOCTYPE html>
<html>
<head>
    <title>CSS Transition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Transition Examples</h1>

<!-- SECTION 1: BASIC TRANSITIONS -->
<section>
    <h2>Basic Transition Types</h2>

    <div class="container">

        <div class="box basic">Basic</div>
        <div class="box property">Property</div>
        <div class="box timing">Timing</div>
        <div class="box delay">Delay</div>
        <div class="box multiple">Multiple</div>

    </div>
</section>

<!-- SECTION 2: TIMING FUNCTIONS -->
<section>
    <h2>Transition Timing Functions</h2>

    <div class="timing-container">
        <div id="div1">linear</div>
        <div id="div2">ease</div>
        <div id="div3">ease-in</div>
        <div id="div4">ease-out</div>
        <div id="div5">ease-in-out</div>
    </div>
</section>

</body>
</html>
