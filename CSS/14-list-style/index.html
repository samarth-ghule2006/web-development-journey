<!DOCTYPE html>
<html>
<head>
    <title>CSS List Styling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS List Styling</h1>

<h2>Default List</h2>
<ul>
    <li>Item One</li>
    <li>Item Two</li>
    <li>Item Three</li>
</ul>

<h2>Custom Bullet</h2>
<ul class="custom">
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ul>

<h2>Inside Position</h2>
<ul class="inside">
    <li>HTML</li>
    <li>CSS</li>
    <li>JS</li>
</ul>

<h2>No Bullet (Navbar Style)</h2>
<ul class="navbar">
    <li>Home</li>
    <li>About</li>
    <li>Contact</li>
</ul>

<h2>Ordered List Style</h2>
<ol class="ordered">
    <li>Step One</li>
    <li>Step Two</li>
    <li>Step Three</li>
</ol>

</body>
</html>
