<!DOCTYPE html>
<html>
<head>
    <title>Object Fit & Position</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Object-Fit & Object-Position</h1>

<!-- OBJECT-FIT -->
<section>
    <h2>Object-Fit Examples</h2>

    <div class="container">

        <div class="card">
            <p>fill</p>
            <img src="image.jpg" class="box fill">
        </div>

        <div class="card">
            <p>contain</p>
            <img src="image.jpg" class="box contain">
        </div>

        <div class="card">
            <p>cover</p>
            <img src="image.jpg" class="box cover">
        </div>

        <div class="card">
            <p>none</p>
            <img src="image.jpg" class="box none">
        </div>

        <div class="card">
            <p>scale-down</p>
            <img src="image.jpg" class="box scale">
        </div>

    </div>
</section>

<!-- OBJECT-POSITION -->
<section>
    <h2>Object-Position Examples</h2>

    <div class="container">

        <div class="card">
            <p>top</p>
            <img src="image.jpg" class="box pos-top">
        </div>

        <div class="card">
            <p>center</p>
            <img src="image.jpg" class="box pos-center">
        </div>

        <div class="card">
            <p>bottom</p>
            <img src="image.jpg" class="box pos-bottom">
        </div>

    </div>
</section>

</body>
</html>
