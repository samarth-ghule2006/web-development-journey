<!DOCTYPE html>
<html>
<head>
    <title>CSS Fonts</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="family">Font Family Example</h1>

<p class="size">This text shows font size</p>

<p class="weight">This text shows font weight</p>

<p class="style">This text is italic</p>

<p class="variant">This text uses small caps</p>

<p class="google">This uses Google Font (Poppins)</p>

</body>
</html>
