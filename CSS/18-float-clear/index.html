<!DOCTYPE html>
<html>
<head>
    <title>CSS Float Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Float Values</h1>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVGHL9r9OucwArH8yO3rEDPryG4V3tSCBw-w&s" class="left-img">
<p>
This image is floated to the left. Text wraps around it.
</p>

<div class="clear"></div>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVGHL9r9OucwArH8yO3rEDPryG4V3tSCBw-w&s" class="right-img">
<p>
This image is floated to the right. Text wraps around the other side.
</p>

<div class="clear"></div>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVGHL9r9OucwArH8yO3rEDPryG4V3tSCBw-w&s" class="none-img">
<p>
This image uses float none (default behavior).
</p>

<div class="parent">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVGHL9r9OucwArH8yO3rEDPryG4V3tSCBw-w&s" class="inherit-img">
    <p>This image inherits float from its parent.</p>
</div>

</body>
</html>
