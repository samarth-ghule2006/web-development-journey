<!DOCTYPE html>
<html>
<head>
    <title>CSS Grid Complete</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Grid Complete Example</h1>

<!-- 1. Grid Intro -->
<h2>1. Grid Intro</h2>
<div class="container intro">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

<!-- 2. Grid Container -->
<h2>2. Grid Container</h2>
<div class="container container-grid">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
    <div class="box">D</div>
</div>

<!-- 3. Grid Items -->
<h2>3. Grid Items</h2>
<div class="container items">
    <div class="box item1">1</div>
    <div class="box item2">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
</div>

<!-- 4. 12 Column Layout -->
<h2>4. 12 Column Layout</h2>
<div class="container grid-12">
    <div class="box span-6">6 Columns</div>
    <div class="box span-6">6 Columns</div>

    <div class="box span-4">4</div>
    <div class="box span-4">4</div>
    <div class="box span-4">4</div>
</div>

<!-- 5. @supports -->
<h2>5. CSS @supports</h2>
<div class="container supports">
    <div class="box">Supports</div>
    <div class="box">Grid</div>
    <div class="box">Check</div>
</div>

</body>
</html>
