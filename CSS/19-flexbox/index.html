<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Complete</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Flexbox All Properties</h1>

<h2>1. Flex Direction</h2>
<div class="container direction">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

<h2>2. Justify Content</h2>
<div class="container justify">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

<h2>3. Align Items</h2>
<div class="container align">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

<h2>4. Flex Wrap</h2>
<div class="container wrap">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
    <div class="box">7</div>
    <div class="box">8</div>
</div>

<h2>5. Gap</h2>
<div class="container gap">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
