<!DOCTYPE html>
<html>
<head>
    <title>HTML Entities</title>
</head>
<body>

<h1>HTML Entities Practice</h1>

<h2>Basic Entities</h2>
<p>Less than: &lt;</p>
<p>Greater than: &gt;</p>
<p>Ampersand: &amp;</p>
<p>Double Quote: &quot;</p>
<p>Single Quote: &apos;</p>

<h2>Symbols</h2>
<p>Copyright: &copy;</p>
<p>Registered: &reg;</p>
<p>Trademark: &trade;</p>
<p>Euro: &euro;</p>

<h2>Non-breaking space</h2>
<p>Hello&nbsp;&nbsp;&nbsp;World</p>

<h2>Code Example</h2>
<pre>
<code>
&lt;h1&gt;Hello World&lt;/h1&gt;
</code>
</pre>

</body>
</html>
